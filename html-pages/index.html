<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Scripts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-100 p-4">

  <h1 class="text-3xl font-bold mb-6">Run Scripts</h1>

  <div class="space-y-4 w-full max-w-xl">
    <div>
      <button data-script="script1" class="px-6 py-3 bg-blue-500 text-white rounded hover:bg-blue-600 transition w-full">
        Open SSH Tunnel
      </button>
      <pre class="mt-2 p-4 bg-gray-200 rounded output"></pre>
    </div>

    <div>
      <button data-script="script2" class="px-6 py-3 bg-green-500 text-white rounded hover:bg-green-600 transition w-full">
        Run Script 2
      </button>
      <pre class="mt-2 p-4 bg-gray-200 rounded output"></pre>
    </div>

    <div>
      <button data-script="script3" class="px-6 py-3 bg-purple-500 text-white rounded hover:bg-purple-600 transition w-full">
        Run Script 3
      </button>
      <pre class="mt-2 p-4 bg-gray-200 rounded output"></pre>
    </div>
  </div>

  <!-- externes JS einbinden -->
  <script src="scripts.js"></script>

</body>
</html>
