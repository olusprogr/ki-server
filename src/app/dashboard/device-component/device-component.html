<div class="flex flex-col h-[calc(100vh-6rem)]">

  <!-- Operation Buttons -->
  <div class="flex flex-wrap gap-2 mb-4">
    <button
      *ngFor="let op of validOperations"
      (click)="sendOperation(op)"
      class="text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-4 py-2 transition dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800"
    >
      {{ op | titlecase }}
    </button>
  </div>

  <!-- Console Header -->
  <div class="bg-white dark:bg-gray-800 rounded-t-lg shadow dark:border dark:border-b-0 dark:border-gray-700 p-4">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
      <h1 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">WebSocket Konsole</h1>
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500 dark:text-gray-400 font-mono">ws://localhost:8080</span>
        <div class="flex items-center gap-1.5">
          <div
            [class.bg-green-500]="isConnected"
            [class.bg-red-500]="!isConnected"
            class="w-2.5 h-2.5 rounded-full animate-pulse">
          </div>
          <span
            class="text-sm font-medium"
            [class.text-green-600]="isConnected"
            [class.dark:text-green-400]="isConnected"
            [class.text-red-500]="!isConnected"
            [class.dark:text-red-400]="!isConnected"
          >
            {{ isConnected ? 'Verbunden' : 'Getrennt' }}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Message Log -->
  <div class="flex-1 bg-gray-50 dark:bg-gray-900 overflow-y-auto p-4 space-y-3 border-x border-gray-200 dark:border-gray-700">
    <div *ngFor="let msg of messageLog">

      <!-- System Message -->
      <div *ngIf="msg.type === 'system'" class="flex justify-center">
        <div class="bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 px-4 py-1.5 rounded-full text-xs border border-gray-200 dark:border-gray-600">
          <span class="font-mono">{{ msg.content }}</span>
          <span class="text-gray-400 dark:text-gray-500 ml-2">{{ msg.timestamp | date:'HH:mm:ss' }}</span>
        </div>
      </div>

      <!-- Sent Message -->
      <div *ngIf="msg.type === 'sent'" class="flex justify-end">
        <div class="max-w-md">
          <div class="bg-primary-600 text-white px-4 py-3 rounded-lg shadow">
            <p class="font-mono text-sm wrap-break-word">{{ msg.content }}</p>
            <p class="text-xs text-primary-200 mt-1">{{ msg.timestamp | date:'HH:mm:ss' }}</p>
          </div>
        </div>
      </div>

      <!-- Received Message -->
      <div *ngIf="msg.type === 'received'" class="flex justify-start">
        <div class="max-w-md">
          <div class="bg-white dark:bg-gray-800 text-gray-900 dark:text-white px-4 py-3 rounded-lg shadow border border-gray-200 dark:border-gray-700">
            <p class="font-mono text-sm wrap-break-word">{{ msg.content }}</p>
            <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">{{ msg.timestamp | date:'HH:mm:ss' }}</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Input Bar -->
  <div class="bg-white dark:bg-gray-800 rounded-b-lg shadow dark:border dark:border-t-0 dark:border-gray-700 p-4">
    <div class="flex gap-3">
      <input
        type="text"
        [(ngModel)]="messageInput"
        (keyup.enter)="sendMessage()"
        [disabled]="!isConnected"
        placeholder="Nachricht eingeben..."
        class="flex-1 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 p-2.5 text-sm font-mono dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500 disabled:opacity-50 disabled:cursor-not-allowed"
      >

      <button
        (click)="sendMessage()"
        [disabled]="!isConnected || !messageInput.trim()"
        class="text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 transition dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        Senden
      </button>
    </div>
  </div>

</div>
