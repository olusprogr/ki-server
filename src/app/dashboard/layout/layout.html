<div class="flex min-h-screen bg-gray-50 dark:bg-gray-900">
  <app-navbar
    [isMobile]="isMobile"
    [menuOpen]="menuOpen"
    (closeMenu)="closeMenu()"
  ></app-navbar>

  <div
    *ngIf="menuOpen && isMobile"
    class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40"
    (click)="toggleMenu()"
  ></div>

  <main class="flex-1 p-6 md:p-8">

    <div *ngIf="isMobile && !menuOpen" class="fixed top-4 left-4 z-40">
      <button
        (click)="toggleMenu()"
        class="bg-white dark:bg-gray-800 p-2.5 rounded-lg shadow-md border border-gray-200 dark:border-gray-700
               text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>

    <div class="max-w-7xl mx-auto">
      <router-outlet></router-outlet>
    </div>

  </main>

</div>
