<aside
  [ngClass]="{
    'fixed inset-y-0 left-0 z-50 w-64': isMobile,
    'static w-64': !isMobile,
    '-translate-x-full': !menuOpen,
    'translate-x-0': menuOpen
  }"
  class="bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 shadow-sm
         transition-transform duration-300 ease-in-out
         overflow-y-auto flex flex-col"
>
  <!-- Logo / Brand -->
  <div class="p-6 pb-4">
    <a href="#" class="flex items-center text-xl font-semibold text-gray-900 dark:text-white">
      <img class="w-7 h-7 mr-2" src="https://flowbite.s3.amazonaws.com/blocks/marketing-ui/logo.svg" alt="logo">
      Münster
    </a>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 space-y-1 text-sm">
    <a
      routerLink="/dashboard/start"
      routerLinkActive="bg-primary-600/10 text-primary-600 dark:text-primary-500 font-semibold"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
      (click)="closeMenu.emit()"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Dashboard
    </a>

    <a
      routerLink="/dashboard/analytics"
      routerLinkActive="bg-primary-600/10 text-primary-600 dark:text-primary-500 font-semibold"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
      (click)="closeMenu.emit()"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
      </svg>
      Analytics
    </a>

    <a
      routerLink="/dashboard/server"
      routerLinkActive="bg-primary-600/10 text-primary-600 dark:text-primary-500 font-semibold"
      class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition"
      (click)="closeMenu.emit()"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
      </svg>
      Server
    </a>
  </nav>

  <!-- Bottom section -->
  <div class="p-4 border-t border-gray-200 dark:border-gray-700">
    <p class="text-xs text-gray-400 dark:text-gray-500 text-center">Münster Panel v1.0</p>
  </div>
</aside>
